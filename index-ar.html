<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dragão 3D com AR</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            z-index: 100;
            font-size: 14px;
            pointer-events: none;
        }
        #status {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }
        #ar-button {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            z-index: 200;
            cursor: pointer;
        }
        #ar-button:active {
            transform: translateX(-50%) scale(0.96);
        }
        @media (max-width: 768px) {
            #info { font-size: 12px; top: 10px; }
            #status { font-size: 10px; bottom: 80px; }
            #ar-button { padding: 12px 24px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div id="info">Dragão 3D com Hit-Test<br>Toque no chão para posicionar!</div>
    <div id="status">Aguardando...</div>
    <button id="ar-button">INICIAR AR</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        console.log('Three.js carregado:', THREE.version);
        
        // Variáveis
        let camera, scene, renderer;
        let reticle;
        let currentDragon = null;
        let hitTestSource = null;
        let isARSessionActive = false;
        
        const statusDiv = document.getElementById('status');
        const arButton = document.getElementById('ar-button');
        
        function updateStatus(msg, isError = false) {
            statusDiv.innerHTML = msg;
            statusDiv.style.color = isError ? '#ff6666' : '#00ff00';
            console.log(msg);
        }
        
        // Criar dragão
        function createDragon() {
            const group = new THREE.Group();
            
            // Corpo
            const body = new THREE.Mesh(
                new THREE.SphereGeometry(0.28, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0x44aa44, roughness: 0.3 })
            );
            body.scale.set(1.2, 0.85, 0.95);
            group.add(body);
            
            // Cabeça
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.24, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0x55bb55 })
            );
            head.position.set(0.52, 0.18, 0);
            group.add(head);
            
            // Olhos
            const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.07, 24, 24), whiteMat);
            leftEye.position.set(0.62, 0.34, 0.19);
            group.add(leftEye);
            
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.07, 24, 24), whiteMat);
            rightEye.position.set(0.62, 0.34, -0.19);
            group.add(rightEye);
            
            // Pupilas
            const blackMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.04, 16, 16), blackMat);
            leftPupil.position.set(0.64, 0.32, 0.21);
            group.add(leftPupil);
            
            const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.04, 16, 16), blackMat);
            rightPupil.position.set(0.64, 0.32, -0.21);
            group.add(rightPupil);
            
            // Chifres
            const hornMat = new THREE.MeshStandardMaterial({ color: 0xaa8866 });
            const hornGeo = new THREE.ConeGeometry(0.075, 0.24, 8);
            const leftHorn = new THREE.Mesh(hornGeo, hornMat);
            leftHorn.position.set(0.58, 0.49, 0.16);
            group.add(leftHorn);
            
            const rightHorn = new THREE.Mesh(hornGeo, hornMat);
            rightHorn.position.set(0.58, 0.49, -0.16);
            group.add(rightHorn);
            
            // Asas
            const wingMat = new THREE.MeshStandardMaterial({ color: 0x33aa33, transparent: true, opacity: 0.8 });
            const wingGeo = new THREE.BoxGeometry(0.55, 0.09, 0.28);
            
            const leftWing = new THREE.Mesh(wingGeo, wingMat);
            leftWing.position.set(-0.28, 0.12, 0.52);
            leftWing.rotation.z = -0.45;
            group.add(leftWing);
            
            const rightWing = new THREE.Mesh(wingGeo, wingMat);
            rightWing.position.set(-0.28, 0.12, -0.52);
            rightWing.rotation.z = -0.45;
            group.add(rightWing);
            
            // Cauda
            const tail = new THREE.Mesh(
                new THREE.ConeGeometry(0.075, 0.42, 8),
                new THREE.MeshStandardMaterial({ color: 0x44aa44 })
            );
            tail.position.set(-0.62, -0.08, 0);
            tail.rotation.x = 0.35;
            group.add(tail);
            
            // Cristas
            for (let i = 0; i < 4; i++) {
                const crest = new THREE.Mesh(
                    new THREE.ConeGeometry(0.05, 0.11, 4),
                    new THREE.MeshStandardMaterial({ color: 0x66cc66 })
                );
                crest.position.set(-0.28 + i * 0.14, 0.22, 0);
                group.add(crest);
            }
            
            return group;
        }
        
        // Criar retículo
        function createReticle() {
            const ring = new THREE.Mesh(
                new THREE.RingGeometry(0.06, 0.1, 24),
                new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.9 })
            );
            ring.rotation.x = -Math.PI / 2;
            
            const inner = new THREE.Mesh(
                new THREE.CircleGeometry(0.04, 16),
                new THREE.MeshBasicMaterial({ color: 0x00ff00, side: THREE.DoubleSide, transparent: true, opacity: 0.7 })
            );
            inner.rotation.x = -Math.PI / 2;
            ring.add(inner);
            
            return ring;
        }
        
        // Iniciar AR
        async function startAR() {
            if (!navigator.xr) {
                updateStatus('WebXR não suportado!', true);
                return;
            }
            
            updateStatus('Solicitando acesso à câmera...');
            
            try {
                const supported = await navigator.xr.isSessionSupported('immersive-ar');
                if (!supported) {
                    updateStatus('AR não suportado neste dispositivo', true);
                    return;
                }
                
                const session = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['hit-test']
                });
                
                await renderer.xr.setSession(session);
                isARSessionActive = true;
                arButton.style.display = 'none';
                updateStatus('AR ativado! Aponte para o chão');
                
                const referenceSpace = await session.requestReferenceSpace('local');
                hitTestSource = await session.requestHitTestSource({ space: referenceSpace });
                
                session.addEventListener('end', () => {
                    isARSessionActive = false;
                    hitTestSource = null;
                    arButton.style.display = 'block';
                    updateStatus('Sessão encerrada');
                    if (currentDragon) {
                        scene.remove(currentDragon);
                        currentDragon = null;
                    }
                });
            } catch (err) {
                console.error(err);
                updateStatus(`Erro: ${err.message}`, true);
                arButton.style.display = 'block';
            }
        }
        
        // Posicionar dragão
        function placeDragon(position) {
            if (currentDragon) scene.remove(currentDragon);
            
            currentDragon = createDragon();
            currentDragon.position.copy(position);
            currentDragon.position.y += 0.05;
            currentDragon.scale.set(0.35, 0.35, 0.35);
            currentDragon.rotation.y = Math.atan2(position.x, position.z);
            
            scene.add(currentDragon);
            updateStatus('Dragão posicionado! Toque em outro local para mover');
            
            // Animação
            currentDragon.scale.set(0, 0, 0);
            let start = Date.now();
            const target = 0.35;
            function animateAppear() {
                const t = Math.min(1, (Date.now() - start) / 400);
                const s = target * (1 - Math.pow(1 - t, 3));
                currentDragon.scale.set(s, s, s);
                if (t < 1) requestAnimationFrame(animateAppear);
            }
            animateAppear();
        }
        
        // ============================================
        // MODO DEBUG - TESTE NO PC
        // ============================================
        function enableDebugMode() {
            console.log('Modo DEBUG ativado');
            arButton.style.display = 'none';
            
            // Criar dragão
            const dragonDebug = createDragon();
            dragonDebug.position.set(0, 0.2, -1.5);
            dragonDebug.scale.set(0.5, 0.5, 0.5);
            scene.add(dragonDebug);
            
            // Ajustar câmera
            camera.position.set(2, 1.5, 2);
            
            // Grade e eixos
            const gridHelper = new THREE.GridHelper(3, 20, 0x88aaff, 0x335588);
            scene.add(gridHelper);
            
            const axesHelper = new THREE.AxesHelper(1);
            scene.add(axesHelper);
            
            // Controles com mouse
            let isDragging = false;
            let lastX = 0, lastY = 0;
            let rotY = 0, rotX = 0;
            
            document.addEventListener('mousedown', (e) => {
                isDragging = true;
                lastX = e.clientX;
                lastY = e.clientY;
                document.body.style.cursor = 'grabbing';
            });
            
            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    rotY += (e.clientX - lastX) * 0.01;
                    rotX += (e.clientY - lastY) * 0.01;
                    dragonDebug.rotation.y = rotY;
                    dragonDebug.rotation.x = Math.max(-1, Math.min(1, rotX));
                    lastX = e.clientX;
                    lastY = e.clientY;
                }
            });
            
            document.addEventListener('mouseup', () => {
                isDragging = false;
                document.body.style.cursor = 'default';
            });
            
            updateStatus('Modo DEBUG - Dragão visível! Arraste o mouse para rotacionar');
            
            function animateDebug() {
                requestAnimationFrame(animateDebug);
                renderer.render(scene, camera);
            }
            animateDebug();
        }
        
        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        async function init() {
            scene = new THREE.Scene();
            scene.background = null;
            
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // Luzes
            scene.add(new THREE.AmbientLight(0x404060));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(1, 2, 1);
            scene.add(dirLight);
            const fillLight = new THREE.PointLight(0x4466cc, 0.3);
            fillLight.position.set(0.5, 1, 0.8);
            scene.add(fillLight);
            
            // Retículo
            reticle = createReticle();
            scene.add(reticle);
            reticle.visible = false;
            
            // Eventos
            window.addEventListener('click', () => {
                if (isARSessionActive && reticle && reticle.visible) {
                    window.placeRequested = true;
                }
            });
            
            window.addEventListener('touchstart', (e) => {
                if (isARSessionActive && reticle && reticle.visible) {
                    e.preventDefault();
                    window.placeRequested = true;
                }
            });
            
            arButton.onclick = startAR;
            
            // Verificar suporte
            if (navigator.xr) {
                const supported = await navigator.xr.isSessionSupported('immersive-ar');
                if (supported) {
                    updateStatus('Pronto! Clique no botão azul');
                } else {
                    updateStatus('AR não suportado neste dispositivo', true);
                    arButton.disabled = true;
                    arButton.textContent = 'AR NÃO SUPORTADO';
                }
            } else {
                updateStatus('Navegador sem suporte a WebXR', true);
                arButton.disabled = true;
                arButton.textContent = 'WEBXR NÃO DISPONÍVEL';
            }
            
            // Animação principal
            function animate() {
                if (hitTestSource && isARSessionActive) {
                    const frame = renderer.xr.getFrame();
                    if (frame) {
                        const refSpace = renderer.xr.getReferenceSpace();
                        const results = frame.getHitTestResults(hitTestSource);
                        
                        if (results.length > 0) {
                            const pose = results[0].getPose(refSpace);
                            if (pose) {
                                reticle.visible = true;
                                reticle.position.copy(pose.transform.position);
                                reticle.position.y += 0.002;
                                reticle.quaternion.copy(pose.transform.orientation);
                                
                                if (window.placeRequested) {
                                    window.placeRequested = false;
                                    placeDragon(pose.transform.position);
                                }
                            }
                        } else {
                            reticle.visible = false;
                        }
                    }
                } else {
                    if (reticle) reticle.visible = false;
                }
                
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            
            animate();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            // Ativar debug se tiver ?debug na URL
            if (window.location.search.includes('debug')) {
                enableDebugMode();
            }
        }
        
        // Iniciar tudo
        init();
    </script>
</body>
</html>
