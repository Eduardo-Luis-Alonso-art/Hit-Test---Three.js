<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragão 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 100;
            font-size: 14px;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }
        @media (max-width: 768px) {
            #info {
                font-size: 12px;
                top: 10px;
                left: 10px;
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    <div id="info">
        Dragão 3D<br>
        Arraste o mouse para rotacionar | Scroll para zoom
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // Configuração da cena
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        scene.fog = new THREE.FogExp2(0x111122, 0.02);
        
        // Câmera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2, 3);
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // Controles
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.2;
        controls.target.set(0, 0.5, 0);
        
        // Luzes
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(2, 3, 2);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.4);
        fillLight.position.set(1, 2, 1);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xffaa66, 0.3);
        backLight.position.set(-1, 1, -1.5);
        scene.add(backLight);
        
        const rimLight = new THREE.PointLight(0xff88aa, 0.2);
        rimLight.position.set(1.5, 1.5, -1);
        scene.add(rimLight);
        
        // Grade no chão
        const gridHelper = new THREE.GridHelper(4, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.6;
        scene.add(gridHelper);
        
        // Eixos de referência
        const axesHelper = new THREE.AxesHelper(1.2);
        axesHelper.position.y = -0.6;
        scene.add(axesHelper);
        
        // Plano para sombra
        const shadowPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(3, 3),
            new THREE.ShadowMaterial({ opacity: 0.4, color: 0x000000, transparent: true })
        );
        shadowPlane.rotation.x = -Math.PI / 2;
        shadowPlane.position.y = -0.59;
        shadowPlane.receiveShadow = true;
        scene.add(shadowPlane);
        
        // Criação do Dragão
        const dragonGroup = new THREE.Group();
        
        // Corpo
        const body = new THREE.Mesh(
            new THREE.SphereGeometry(0.28, 32, 32),
            new THREE.MeshStandardMaterial({ color: 0x44aa44, roughness: 0.3, metalness: 0.1 })
        );
        body.scale.set(1.2, 0.85, 0.95);
        body.castShadow = true;
        dragonGroup.add(body);
        
        // Cabeça
        const head = new THREE.Mesh(
            new THREE.SphereGeometry(0.24, 32, 32),
            new THREE.MeshStandardMaterial({ color: 0x55bb55 })
        );
        head.position.set(0.52, 0.18, 0);
        head.castShadow = true;
        dragonGroup.add(head);
        
        // Olhos
        const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.07, 24, 24), whiteMat);
        leftEye.position.set(0.62, 0.34, 0.19);
        dragonGroup.add(leftEye);
        
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.07, 24, 24), whiteMat);
        rightEye.position.set(0.62, 0.34, -0.19);
        dragonGroup.add(rightEye);
        
        // Pupilas
        const blackMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.04, 16, 16), blackMat);
        leftPupil.position.set(0.64, 0.32, 0.21);
        dragonGroup.add(leftPupil);
        
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.04, 16, 16), blackMat);
        rightPupil.position.set(0.64, 0.32, -0.21);
        dragonGroup.add(rightPupil);
        
        // Chifres
        const hornMat = new THREE.MeshStandardMaterial({ color: 0xaa8866 });
        const hornGeo = new THREE.ConeGeometry(0.075, 0.24, 8);
        
        const leftHorn = new THREE.Mesh(hornGeo, hornMat);
        leftHorn.position.set(0.58, 0.49, 0.16);
        dragonGroup.add(leftHorn);
        
        const rightHorn = new THREE.Mesh(hornGeo, hornMat);
        rightHorn.position.set(0.58, 0.49, -0.16);
        dragonGroup.add(rightHorn);
        
        // Asas
        const wingMat = new THREE.MeshStandardMaterial({ color: 0x33aa33, transparent: true, opacity: 0.85 });
        const wingGeo = new THREE.BoxGeometry(0.55, 0.09, 0.28);
        
        const leftWing = new THREE.Mesh(wingGeo, wingMat);
        leftWing.position.set(-0.28, 0.12, 0.52);
        leftWing.rotation.z = -0.45;
        leftWing.castShadow = true;
        dragonGroup.add(leftWing);
        
        const rightWing = new THREE.Mesh(wingGeo, wingMat);
        rightWing.position.set(-0.28, 0.12, -0.52);
        rightWing.rotation.z = -0.45;
        rightWing.castShadow = true;
        dragonGroup.add(rightWing);
        
        // Cauda
        const tail = new THREE.Mesh(
            new THREE.ConeGeometry(0.075, 0.42, 8),
            new THREE.MeshStandardMaterial({ color: 0x44aa44 })
        );
        tail.position.set(-0.62, -0.08, 0);
        tail.rotation.x = 0.35;
        tail.castShadow = true;
        dragonGroup.add(tail);
        
        // Cristas
        const crestMat = new THREE.MeshStandardMaterial({ color: 0x66cc66 });
        for (let i = 0; i < 4; i++) {
            const crest = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.11, 4), crestMat);
            crest.position.set(-0.28 + i * 0.14, 0.22, 0);
            dragonGroup.add(crest);
        }
        
        // Escamas laterais
        const scaleMat = new THREE.MeshStandardMaterial({ color: 0x55aa55 });
        for (let i = 0; i < 5; i++) {
            const scale = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 8), scaleMat);
            scale.position.set(-0.1 + i * 0.1, 0.05, 0.48);
            dragonGroup.add(scale);
            
            const scale2 = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 8), scaleMat);
            scale2.position.set(-0.1 + i * 0.1, 0.05, -0.48);
            dragonGroup.add(scale2);
        }
        
        dragonGroup.position.set(0, 0, 0);
        dragonGroup.scale.set(0.65, 0.65, 0.65);
        scene.add(dragonGroup);
        
        // Estrelas
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1500;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 100 - 50;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.08 }));
        scene.add(stars);
        
        // Animação
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.008;
            
            dragonGroup.position.y = Math.sin(time) * 0.03;
            
            const wingAngle = Math.sin(time * 1.8) * 0.12;
            leftWing.rotation.z = -0.45 + wingAngle;
            rightWing.rotation.z = -0.45 + wingAngle;
            
            tail.rotation.x = 0.35 + Math.sin(time * 1.5) * 0.05;
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', onWindowResize);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
